name: Echidna

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  echidna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run Echidna
        uses: crytic/echidna-action@v2
        with:
          solc-version: 0.8.28
          files: contracts/echidna/EchidnaPublicLiquidityPool.sol
          contract: EchidnaPublicLiquidityPool
          config: contracts/echidna/config.yaml